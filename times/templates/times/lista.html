<!DOCTYPE html>
<html>
<head>
    <title>Times de Futebol</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'times/istilo.css' %}">
</head>
<body class="bg-gradient text-light" id="body">

<div class="container mt-5">

    <h1 class="text-center mb-4">Times de Futebol</h1>
    <div class="text-center mb-4">
    <button class="btn btn-success" onclick="toggleForm()">Adicionar Novo Time</button>
</div>

<div id="form-criar" class="card-time p-3 mb-4" style="display:none;">
    <form method="POST" action="{% url 'criar_time' %}">
        {% csrf_token %}

        <div class="mb-2">
            <input type="text" name="nome" class="form-control" placeholder="Nome do time">
        </div>

        <div class="mb-2">
            <input type="text" name="cidade" class="form-control" placeholder="Cidade">
        </div>

        <div class="mb-2">
            <input type="number" name="fundacao" class="form-control" placeholder="Ano de fundação">
        </div>

        <button class="btn btn-success">Salvar</button>
    </form>
</div>

    <div class="row">
        {% for time in times %}
            <div class="col-md-6">
                <div class="card-time text-light">
                    <div class="card-body">
                        <h5 class="card-title text-warning">⚽ {{ time.nome }} ⚽</h5>
                        <p class="card-text">📍 {{ time.cidade }}</p>
                        <p class="card-text">📅 Fundação: {{ time.fundacao }}</p>

                        <a href="{% url 'editar_time' time.id %}" id="btn-editar" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'excluir_time' time.id %}" id="btn-excluir" class="btn btn-danger btn-sm">Excluir</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

<div class="text-center mt-4 mb-4">
    <button class="btn btn-info" onclick="trocarFundo()">Wallpaper</button>
</div>

<script>
function trocarFundo() {
    const body = document.getElementById("body");

    // inicia fade out
    body.classList.add("fade-out");

    setTimeout(() => {
        if (body.classList.contains("bg-gradient")) {
            body.classList.remove("bg-gradient");
            body.classList.add("bg-imagem");
        } else {
            body.classList.remove("bg-imagem");
            body.classList.add("bg-gradient");
        }

        // volta com fade in
        body.classList.remove("fade-out");
        body.classList.add("fade-in");

        setTimeout(() => {
            body.classList.remove("fade-in");
        }, 500);

    }, 300);
}
function toggleForm() {
    const form = document.getElementById("form-criar");
    form.style.display = form.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
