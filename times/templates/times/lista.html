<!DOCTYPE html>
<html>
<head>
    <title>Times de Futebol</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'times/istilo.css' %}">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Times de Futebol</h1>

    <div class="row">
        {% for time in times %}
            <div class="col-md-6">
                <div class="card-time text-light">
                    <div class="card-body">
                        <h5 class="card-title text-warning">{{ time.nome }}</h5>
                        <p class="card-text">📍 {{ time.cidade }}</p>
                        <p class="card-text">📅 Fundação: {{ time.fundacao }}</p>

                        <a href="{% url 'editar_time' time.id %}" id="btn-editar" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'excluir_time' time.id %}" id="btn-excluir" class="btn btn-danger btn-sm">Excluir</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
