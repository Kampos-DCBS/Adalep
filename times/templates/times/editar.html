<!DOCTYPE html>
<html>
<head>
    <title>Editar Time</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <h2 class="mb-4">✏️ Editar Time</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" value="{{ time.nome }}">
        </div>

        <div class="mb-3">
            <label>Cidade</label>
            <input type="text" name="cidade" class="form-control" value="{{ time.cidade }}">
        </div>

        <div class="mb-3">
            <label>Fundação</label>
            <input type="number" name="fundacao" class="form-control" value="{{ time.fundacao }}">
        </div>

        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </form>

</div>

</body>
</html>
